<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tênis — Sport Closet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="brand-page is-loading" data-page="tenis">

  <div class="hero-slider" id="heroSlider">
    <div class="slide active">
      <picture>
        <source media="(max-width: 768px)" srcset="https://pub-4af8db08776e49b78718c90c788bddab.r2.dev/hero-2-mobile.jpg">
        <img src="https://pub-4af8db08776e49b78718c90c788bddab.r2.dev/hero-2-desktop.jpg" alt="Banner Tênis" loading="eager">
      </picture>
      <div class="slide-content">
        <div class="slide-subtitle">PISANDO COM ESTILO</div>
        <div class="slide-title">OS MELHORES<br><span>TÊNIS</span></div>
      </div>
    </div>
  </div>

  <div class="filter-section">
    <div class="section-title">OS MELHORES <span>TÊNIS</span></div>
    <div class="fg-label">Filtrar por Marca:</div>
    <div class="filter-group" id="dynamicBrandFilters">
        <button class="fb active" data-g="marca" data-v="todos" onclick="setFilter('marca','todos')">TODAS</button>
        <!-- Injetado dinamicamente via loja.js -->
    </div>

    <div class="fg-label" style="margin-top:20px">Filtrar por Modelo:</div>
    <div class="filter-group" id="dynamicModelFilters">
        <button class="fb active" data-g="peca" data-v="todos" onclick="setFilter('peca','todos')">TODOS</button>
        <!-- Injetado dinamicamente via loja.js -->
    </div>
  </div>

  <div class="products-section">
    <div class="ph">
      <div class="pcount" id="pcount"></div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <script src="dynamic-components.js"></script>
  <script src="loja.js"></script>
  <script src="animacoes.js"></script>
</body>
</html>
