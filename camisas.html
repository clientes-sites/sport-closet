<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camisas de Time — Sport Closet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="brand-page is-loading" data-page="camisas">

  <div class="hero-slider" id="heroSlider">
    <div class="slide active">
      <picture>
        <source media="(max-width: 768px)" srcset="https://pub-4af8db08776e49b78718c90c788bddab.r2.dev/banner-hero-mobile-camisas-de-time.png">
        <img src="https://pub-4af8db08776e49b78718c90c788bddab.r2.dev/banner-hero-desktop-camisas-de-time.png" alt="Camisas de Time" loading="eager">
      </picture>
      <div class="slide-content">
        <div class="slide-subtitle">LEVE A PAIXÃO</div>
        <div class="slide-title">CAMISAS<br>DE <span>TIME</span></div>
      </div>
    </div>
  </div>

  <div class="filter-section">
    <div class="section-title">CAMISAS DE <span>TIME</span></div>
    <div class="fg-label">Filtrar por Liga:</div>
    <div class="filter-group" id="dynamicLigaFilters">
        <button class="fb active" data-g="liga" data-v="todos" onclick="setFilter('liga','todos')">TODAS</button>
        <!-- Injetado dinamicamente via loja.js -->
    </div>
  </div>

  <div class="products-section">
    <div class="ph">
      <div class="pcount" id="pcount"></div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <script src="dynamic-components.js"></script>
  <script src="loja.js"></script>
  <script src="animacoes.js"></script>
</body>
</html>
