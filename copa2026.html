<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copa 2026 — Sport Closet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="brand-page is-loading" data-page="copa2026">

  <div class="hero-slider" id="heroSlider">
    <div class="slide active">
      <picture>
        <source media="(max-width: 768px)"
          srcset="https://pub-4af8db08776e49b78718c90c788bddab.r2.dev/hero-1-mobile.jpg">
        <img src="https://pub-4af8db08776e49b78718c90c788bddab.r2.dev/hero-1-desktop.jpg"
          alt="Banner Camisas de Seleção" loading="eager">
      </picture>
      <div class="slide-content">
        <div class="slide-subtitle">COPA 2026</div>
        <div class="slide-title">A MAIOR JORNADA DO<br>FUTEBOL <span>COMEÇA AQUI</span></div>
      </div>
    </div>
  </div>

  <div class="filter-section">
    <div class="section-title">COPA <span>2026</span></div>
    <div class="fg-label">Filtrar por Patrocinadora:</div>
    <div class="filter-group" id="dynamicSponsorFilters">
      <button class="fb active" data-g="tipo" data-v="todos" onclick="setFilter('tipo','todos')">TODAS</button>
      <!-- Injetado dinamicamente via loja.js -->
    </div>
  </div>

  <div class="products-section">
    <div class="ph">
      <div class="pcount" id="pcount"></div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <script src="dynamic-components.js"></script>
  <script src="loja.js"></script>
  <script src="animacoes.js"></script>
</body>

</html>
