<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roupas de Verão — Sport Closet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="brand-page is-loading" data-page="roupas-verao">

  <div class="hero-slider" id="heroSlider">
    <div class="slide active">
      <picture>
        <source media="(max-width: 768px)" srcset="https://via.placeholder.com/768x300.png?text=Roupas+de+Verão">
        <img src="https://via.placeholder.com/1920x400.png?text=Roupas+de+Verão" alt="Roupas de Verão" loading="eager">
      </picture>
      <div class="slide-content">
        <div class="slide-subtitle">PARA O DIA A DIA</div>
        <div class="slide-title">ROUPAS DE <span>VERÃO</span></div>
      </div>
    </div>
  </div>

  <div class="filter-section">
    <div class="section-title">ROUPAS DE <span>VERÃO</span></div>
    <div class="fg-label">Filtrar por Marca:</div>
    <div class="filter-group" id="dynamicBrandFilters">
        <button class="fb active" data-g="marca" data-v="todos" onclick="setFilter('marca','todos')">TODAS</button>
        <!-- Injetado dinamicamente via loja.js -->
    </div>

    <div class="fg-label" style="margin-top:20px">Tipo de Peça:</div>
    <div class="filter-group" id="dynamicPieceFilters">
        <button class="fb active" data-g="peca" data-v="todos" onclick="setFilter('peca','todos')">TODOS</button>
        <!-- Injetado dinamicamente via loja.js -->
    </div>
  </div>

  <div class="products-section">
    <div class="ph">
      <div class="pcount" id="pcount"></div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <script src="dynamic-components.js"></script>
  <script src="loja.js"></script>
  <script src="animacoes.js"></script>
</body>
</html>
